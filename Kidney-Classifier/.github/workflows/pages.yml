name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site for GitHub Pages
        run: |
          mkdir -p public
          # Ensure index.html exists at root (prioritize root over templates)
          if [ -f index.html ]; then
            cp index.html public/index.html
          elif [ -f templates/index.html ]; then
            cp templates/index.html public/index.html
          else
            echo "No index.html found!"
            exit 1
          fi
          echo "Deploying $(ls -la public/)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

